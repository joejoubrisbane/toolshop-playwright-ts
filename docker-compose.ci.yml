services:
  laravel-api:
    image: testsmith/practice-software-testing-sprint5-api
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: toolshop
      DB_USERNAME: user
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DISABLE_LOGGING: false
      MAIL_MAILER: log
    volumes:
      - laravel-app-code:/var/www
    depends_on:
       mariadb:
          condition: service_healthy

  angular-ui:
    image: testsmith/practice-software-testing-sprint5-ui
    ports:
      - "4200:4200"
    command: ng serve --host 0.0.0.0 --port 4200

  web:
    image: nginx:alpine
    ports:
      - "8091:80"
    volumes:
      - laravel-app-code:/var/www
      - ./nginx.ci.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - laravel-api

  mariadb:
    image: yobasystems/alpine-mariadb:10.6.11
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: toolshop
    healthcheck:                     # ← new block
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  laravel-app-code:

name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Start application
      run: |
        docker compose -f docker-compose.ci.yml up -d
        sleep 10
      env:
        MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}


    - name: Seed database
      run: |
        docker compose -f docker-compose.ci.yml exec -T laravel-api php artisan migrate:fresh --seed --force
        docker compose -f docker-compose.ci.yml exec -T laravel-api php artisan cache:clear

    - name: Wait for API
      run: |
        echo "Waiting for API..."
        timeout 120 bash -c 'until [ "$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8091/products)" = "200" ]; do echo "HTTP $(curl -s -o /dev/null -w "%{http_code}" http://localhost:8091/products), retrying..."; sleep 5; done'

    - name: Wait for Angular UI
      run: |
        echo "Waiting for Angular UI..."
        timeout 300 bash -c 'until curl -sf http://localhost:4200 > /dev/null; do sleep 10; done'

    - uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Run Playwright tests
      run: npx playwright test
      env:
        BASE_URL: http://localhost:4200
        API_URL: http://localhost:8091
        TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
        TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        CUSTOMER_EMAIL: ${{ secrets.CUSTOMER_EMAIL }}
        NEW_USER_PASSWORD: ${{ secrets.NEW_USER_PASSWORD }}

    - name: Run Performance Tests
      run: k6 run tests/performance/endpoints/product.perf.ts

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

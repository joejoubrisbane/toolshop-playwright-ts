name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Start application
      run: docker compose -f docker-compose.ci.yml up -d

    - name: Wait for MariaDB
      run: |
        echo "Waiting for MariaDB..."
        timeout 60 bash -c 'until docker compose -f docker-compose.ci.yml exec -T mariadb mysqladmin ping -uroot -proot --silent 2>/dev/null; do sleep 3; done'

    - name: Seed database
      run: docker compose -f docker-compose.ci.yml exec -T laravel-api php artisan migrate:fresh --seed --force

    - name: Wait for API
      run: |
        echo "Waiting for API..."
        timeout 60 bash -c 'until curl -sf http://localhost:8091/products > /dev/null; do sleep 3; done'

    - name: Wait for Angular UI
      run: |
        echo "Waiting for Angular UI..."
        timeout 300 bash -c 'until curl -sf http://localhost:4200 > /dev/null; do sleep 10; done'

    - uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Run Playwright tests
      run: npx playwright test
      env:
        BASE_URL: http://localhost:4200
        API_URL: http://localhost:8091
        TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
        TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        CUSTOMER_EMAIL: ${{ secrets.CUSTOMER_EMAIL }}
        NEW_USER_PASSWORD: ${{ secrets.NEW_USER_PASSWORD }}

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
